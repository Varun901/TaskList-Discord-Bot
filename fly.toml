# fly.toml — Fly.io deployment config for Discord Task Bot
# Docs: https://fly.io/docs/reference/configuration/
#
# Replace "your-bot-name" below with a unique name for your app
# (lowercase letters, numbers, hyphens only — e.g. "my-discord-taskbot")

app            = "your-bot-name"
primary_region = "yyz"           # Toronto — change to your nearest region
                                 # Options: ord, iad, lhr, cdg, syd, nrt, sin
                                 # Full list: https://fly.io/docs/reference/regions/

[build]
  # Uses the Dockerfile in this folder automatically

[env]
  # Non-secret config — safe to commit
  DAILY_POST_HOUR   = "8"
  DAILY_POST_MINUTE = "0"
  TIMEZONE          = "America/Toronto"
  DATABASE_PATH     = "/data/taskbot.db"

# Persistent volume — keeps your SQLite database across deploys and restarts
# Create it once with: fly volumes create taskbot_data --region yyz --size 1
[mounts]
  source      = "taskbot_data"
  destination = "/data"

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1

# ── How to deploy ─────────────────────────────────────────────────────────────
#
# 1. Install Fly CLI:
#      macOS:   brew install flyctl
#      Windows: powershell -ExecutionPolicy Bypass -Command "iwr https://fly.io/install.ps1 -useb | iex"
#      Linux:   curl -L https://fly.io/install.sh | sh
#
# 2. Log in:
#      fly auth signup   (first time)
#      fly auth login    (returning)
#
# 3. Set your bot token as a secret (never put it in this file):
#      fly secrets set DISCORD_BOT_TOKEN="your_token_here"
#
# 4. Create the persistent volume (once only):
#      fly volumes create taskbot_data --region yyz --size 1
#
# 5. Deploy:
#      fly launch --no-deploy   (first time — registers the app)
#      fly deploy               (builds and starts the bot)
#
# 6. Check logs:
#      fly logs
